name: Pipeline DevOps SENA
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validar-y-construir:
    name: Verificar y desplegar
    runs-on: ubuntu-latest

    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v4

      - name: Validar configuración de Docker Compose
        run: docker compose config

      - name: Construir imágenes de contenedores
        run: docker compose build --no-cache

      - name: Levantar servicios para prueba
        run: docker compose up -d

      - name: Esperar inicio de servicios
        run: sleep 12

      - name: Probar conexión con Backend
        run: curl --fail http://localhost:5000/api/mensaje

      - name: Probar acceso al Frontend
        run: curl --fail http://localhost:8080

      - name: Detener y limpiar contenedores
        run: docker compose down