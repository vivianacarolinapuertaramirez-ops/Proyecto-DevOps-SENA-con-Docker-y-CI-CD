name: Pipeline DevOps SENA
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validar-proyecto:
    runs-on: ubuntu-22.04
    steps:
      - name: Obtener código del repositorio
        uses: actions/checkout@v4

      - name: Instalar Docker Compose (método compatible)
        run: |
          sudo apt update -y
          sudo apt install -y docker-compose
          sudo ln -s /usr/bin/docker-compose /usr/local/bin/docker-compose

      - name: Verificar versión instalada
        run: docker-compose --version

      - name: Validar configuración de Docker Compose
        run: docker-compose config

      - name: Construir imágenes
        run: docker-compose build --no-cache

      - name: Levantar servicios
        run: docker-compose up -d

      - name: Esperar inicio completo
        run: sleep 20

      - name: Probar API del Backend
        run: curl --connect-timeout 10 --retry 3 --retry-delay 3 http://localhost:5000/api/mensaje

      - name: Probar interfaz del Frontend
        run: curl --connect-timeout 10 --retry 3 --retry-delay 3 http://localhost:8080

      - name: Limpiar recursos
        run: docker-compose down