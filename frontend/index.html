<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proyecto DevOps SENA</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor">
        <h1>✅ Proyecto DevOps en Contenedores</h1>
        <p>Aplicación desplegada con Docker y automatización CI/CD</p>
        <div class="caja-respuesta">
            <h3>Respuesta del Backend:</h3>
            <p id="mensaje">Cargando conexión...</p>
        </div>
    </div>

    <script>
        fetch("http://localhost:5000/api/mensaje")
            .then(respuesta => respuesta.json())
            .then(datos => {
                document.getElementById("mensaje").textContent = datos.mensaje;
            })
            .catch(error => {
                document.getElementById("mensaje").textContent = "❌ Error al conectar con el servidor";
                console.error(error);
            });
    </script>
</body>
</html>
